name: Daily Naver Land Scraper

on:
  schedule:
    # Runs at 01:00 UTC daily = 10:00 KST (Korea Standard Time)
    - cron: "0 1 * * *"
  workflow_dispatch:
    # Also allows manual trigger from GitHub Actions UI

jobs:
  scrape:
    name: Scrape Naver Land Listings
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: scraper/package.json

      - name: Install scraper dependencies
        working-directory: scraper
        run: npm install

      - name: Run scraper
        working-directory: scraper
        env:
          AIRTABLE_TOKEN: ${{ secrets.AIRTABLE_TOKEN }}
          AIRTABLE_BASE_ID: ${{ secrets.AIRTABLE_BASE_ID }}
          AIRTABLE_TABLE_ID: ${{ secrets.AIRTABLE_TABLE_ID }}
        run: node index.js

      - name: Upload run log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: scraper-failure-log
          path: scraper/
          retention-days: 7
